{% extends "base.html" %}

{% block title %}Check Your Email — Hotel Booking{% endblock title %}

{% block content %}
<style>
  .auth-card {
    max-width: 440px;
    margin: 0 auto;
    padding: 64px 0;
    text-align: center;
  }

  .icon-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    color: var(--accent);
    font-size: 28px;
  }

  .auth-card h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
  }

  .auth-card p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .auth-card .note {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .btn {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    transition: opacity 0.2s;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }

  .btn:hover { opacity: 0.9; color: #fff; }
</style>

<div class="auth-card">
  <div class="icon-circle">&#9993;</div>
  <h1>Check your email</h1>
  <p>We've sent you instructions for resetting your password.</p>
  <p class="note">If you don't see it, check your spam folder.</p>
  <a href="{% url 'home' %}" class="btn">Back to home</a>
</div>
{% endblock content %}
