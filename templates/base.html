<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Hotel Booking App{% endblock title %}</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      body {
        background-color: #f4f4f4;
        font-family: "Times New Roman", Times, serif;
      }

      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .nav-links ul {
        display: flex;
        list-style: none;
        gap: 40px;
      }

      .nav-links a {
        text-decoration: none;
        color: #333;
        font-size: 16px;
      }

      .nav-links .logo-link {
        font-size: 25px;
        font-weight: bold;
        color: #000;
      }

      .nav-links a:hover {
        color: #007bff;
      }

      .nav-bar button {
        margin-left: 10px;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .footer-container {
        padding: 40px 30px;
        text-align: center;
      }

      .footer-container p {
        color: #666;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      {% block content %}
      <div class="head-container">
        <div class="nav-bar">
          <nav class="nav-links">
            <ul>
              <li>
                <a class="logo-link" href="#">Hotel.</a>
              </li>
            </ul>
            <ul>
              <li><a href="#">Home</a></li>
              <li><a href="#">Booking</a></li>
              <li><a href="#">Blog</a></li>
              <li><a href="#">Contact us</a></li>
            </ul>
          </nav>
          <div class="auth-buttons">
            <button style="background: none; color: #333">Log in</button>
            <button style="background: #007bff; color: white">Sign up</button>
          </div>
        </div>
        <div class="footer-container">
          <div class="footer">
            <p>
              Trusted by individuals and teams at the worlds <br />
              best companies
            </p>
          </div>
        </div>
      </div>
      {% endblock content %}
    </main>
  </body>
</html>
